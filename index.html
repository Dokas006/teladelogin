<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="midia.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
                <!-- Imagem aplicada com CSS -->
            </div>

            <div id="form">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente! Faça login para entrar no seu ambiente</p>

                <form action="login.js" method="post">

                    <div id="cadastro">
                        <label for="imail">Qual seu E-main?</label>
                        <input type="email" name="imail" id="imain">
                    </div>

                    <div id="cadastro">
                        
                        <label for="isenha">Qual sua senha?</label>
                        <input type="password" name="senha" id="senha">
                    </div>
                    <input type="submit" value="Entrar">
                    <a href="esqueci.html">Esqueci minha senha</a>
                </form>
            </div>

        </section>
    </main>


</body>
</html>
